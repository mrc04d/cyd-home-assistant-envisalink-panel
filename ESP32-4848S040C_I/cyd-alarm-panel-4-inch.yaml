            align: TOP_RIGHT
            x: -26
            y: 22
            width: 9
            height: 27
            radius: 2
            bg_color: 0x3C3C3C
            border_width: 0

        - obj:
            id: status_card
            align: CENTER
            y: -30
            width: 420
            height: 180
            bg_color: 0x161B22
            radius: 24
            border_width: 3
            border_color: 0x30363D

        - label:
            id: status_label
            text: "Loading..."
            align: CENTER
            y: -30
            text_color: 0xFFFFFF
            text_font: montserrat_48

        - button:
            id: stay_btn
            align: BOTTOM_LEFT
            x: 30
            y: -30
            width: 195
            height: 110
            radius: 18
            bg_color: ${button_blue}
            border_width: 0
            pressed:
              bg_color: ${button_blue_pressed}
            on_press:
              - logger.log: "STAY button pressed"
              - homeassistant.action:
                  action: alarm_control_panel.alarm_arm_home
                  data:
                    entity_id: ${alarm_entity}
            widgets:
              - label:
                  align: CENTER
                  text: "STAY"
                  text_color: 0xFFFFFF
                  text_font: montserrat_36

        - button:
            id: away_btn
            align: BOTTOM_RIGHT
            x: -30
            y: -30
            width: 195
            height: 110
            radius: 18
            bg_color: ${button_blue}
            border_width: 0
            pressed:
              bg_color: ${button_blue_pressed}
            on_press:
              - logger.log: "AWAY button pressed"
              - homeassistant.action:
                  action: alarm_control_panel.alarm_arm_away
                  data:
                    entity_id: ${alarm_entity}
            widgets:
              - label:
                  align: CENTER
                  text: "AWAY"
                  text_color: 0xFFFFFF
                  text_font: montserrat_36

        - button:
            id: cancel_btn
            align: BOTTOM_MID
            y: -30
            width: 300
            height: 110
            radius: 18
            bg_color: ${button_blue}
            border_width: 0
            pressed:
              bg_color: ${button_blue_pressed}
            on_press:
              - logger.log: "Cancel button pressed"
              - script.execute: open_numpad
            widgets:
              - label:
                  align: CENTER
                  text: "CANCEL"
                  text_color: 0xFFFFFF
                  text_font: montserrat_36

        - button:
            id: disarm_btn
            align: BOTTOM_MID
            y: -30
            width: 300
            height: 110
            radius: 18
            bg_color: ${button_blue}
            border_width: 0
            pressed:
              bg_color: ${button_blue_pressed}
            on_press:
              - logger.log: "DISARM button pressed"
              - script.execute: open_numpad
            widgets:
              - label:
                  align: CENTER
                  text: "DISARM"
                  text_color: 0xFFFFFF
                  text_font: montserrat_36

    - id: numpad_page
      bg_color: 0x0D1117
      widgets:
        - obj:
            align: TOP_MID
            y: 18
            width: 444
            height: 92
            bg_color: 0x161B22
            radius: 18
            border_width: 3
            border_color: 0x30363D

        - label:
            id: pin_display
            align: TOP_MID
            y: 30
            text: "ENTER CODE"
            text_align: CENTER
            text_color: 0x8B949E
            text_font: montserrat_22

        - label:
            id: pin_mask
            align: TOP_MID
            y: 62
            text: ""
            text_align: CENTER
            text_color: 0xFFFFFF
            text_font: montserrat_28

        - button:

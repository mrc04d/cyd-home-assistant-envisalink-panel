# =============================================================================
# Guition ESP32-4848S040C_I - Alarm Panel for Envisalink
# =============================================================================
# Full alarm panel UI scaled for the 4-inch 480x480 display.
# Based on the original CYD 2.8" panel, proportionally scaled.
#
# Hardware:
#   - Board: Guition ESP32-4848S040C_I
#   - Display: 4.0" 480x480 ST7701S RGB LCD
#   - Touch: GT911 Capacitive (I2C, Polling Mode)
#   - ESP32: ESP32-S3 with 16MB Flash, 8MB PSRAM (Octal)
#
# Purchase: https://www.aliexpress.com/item/1005008797813823.html
#
# Scale Factor from CYD (320x240):
#   - Width: 480/320 = 1.5x
#   - Height: 480/240 = 2.0x
#
# Original CYD project: https://github.com/mrc04d/cyd-home-assistant-envisalink-panel
# =============================================================================

substitutions:
  device_name: guition-alarm-panel
  friendly_name: "Guition Alarm Panel"
  # Change this to your alarm entity ID
  alarm_entity: "alarm_control_panel.home_alarm_partition_1"
  # Grace period in milliseconds (10 seconds = 10000)
  grace_period_ms: "10000"
  # Change this to your timezone - examples:
  # Australia/Sydney, America/New_York, Europe/London, Asia/Tokyo
  # Full list: https://en.wikipedia.org/wiki/List_of_tz_database_time_zones
  timezone: "Australia/Sydney"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  platformio_options:
    board_build.flash_mode: dio
    board_build.f_flash: 80000000L
    build_flags:
      - "-DARDUINO_USB_CDC_ON_BOOT=0"
  on_boot:
    priority: 600
    then:
      - light.turn_on:
          id: backlight
          brightness: 0.85
          transition_length: 800ms
      - delay: 500ms
      - script.execute: check_wifi_and_show_page
      - delay: 100ms
      - script.execute: update_status
      - script.execute: update_wifi_bars

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
      CONFIG_SPIRAM_RODATA: "y"

psram:
  mode: octal
  speed: 80MHz

logger:

api:
  reboot_timeout: 0s

ota:
  - platform: esphome

# =============================================================================
# WiFi Configuration
# =============================================================================
# Option 1: Use the captive portal (default)
#   - On first boot, the device creates a WiFi access point
#   - Connect to "Guition Alarm Panel Setup" with password "configme123"
#   - A portal will open to configure your WiFi credentials
#
# Option 2: Hardcode your WiFi credentials
#   - Uncomment the ssid/password lines below
#   - Add your credentials to secrets.yaml (ESPHome Dashboard → Secrets):
#       wifi_ssid: "Your_WiFi_Name"
#       wifi_password: "Your_WiFi_Password"
#   - Or replace !secret references with your actual credentials
#
# Option 3: Static IP (optional, use with Option 2)
#   - Uncomment the manual_ip section below
# =============================================================================
wifi:
  # Uncomment below to hardcode WiFi credentials
  # ssid: !secret wifi_ssid
  # password: !secret wifi_password
  
  # Optional: Uncomment below for static IP
  # manual_ip:
  #   static_ip: 192.168.1.108
  #   gateway: 192.168.1.1
  #   subnet: 255.255.255.0
  #   dns1: 192.168.1.1
  
  # Fallback/Setup AP - connects to this if no WiFi configured or connection fails
  ap:
    ssid: "${friendly_name} Setup"
    password: "configme123"
  
  reboot_timeout: 0s

captive_portal:

time:
  - platform: sntp
    id: sntp_time
    timezone: ${timezone}
    servers:
      - 0.pool.ntp.org
      - 1.pool.ntp.org
      - 2.pool.ntp.org

# =============================================================================
# GLOBALS
# =============================================================================
globals:
  - id: last_touch
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: pin_code
    type: std::string
    restore_value: no
    initial_value: '""'
  - id: arming_started
    type: uint32_t
    restore_value: no
    initial_value: '0'

# =============================================================================
# Hardware Configuration
# =============================================================================

# SPI for ST7701S initialization
spi:
  - id: lcd_spi
    clk_pin: GPIO48
    mosi_pin: GPIO47

# I2C for GT911 touch (polling mode)
i2c:
  id: touchscreen_bus
  sda: GPIO19
  scl:
    number: GPIO45
    ignore_strapping_warning: true
  frequency: 400kHz

# Backlight
output:
  - platform: ledc
    id: backlight_pwm
    pin: GPIO38
    frequency: 150Hz
    min_power: 0.01
    zero_means_zero: true

light:
  - platform: monochromatic
    output: backlight_pwm
    name: "${friendly_name} Backlight"
    id: backlight
    restore_mode: ALWAYS_ON
    default_transition_length: 0s

# =============================================================================
# Sensors
# =============================================================================
sensor:
  - platform: wifi_signal
    name: "${friendly_name} WiFi Signal"
    id: wifi_signal_db
    update_interval: 10s

# =============================================================================
# Display - ST7701S 480x480
# =============================================================================
display:
  - platform: st7701s
    id: my_display
    dimensions:
      width: 480
      height: 480
    spi_mode: MODE3
    data_rate: 2MHz
    color_order: RGB
    invert_colors: false
    cs_pin: GPIO39
    de_pin: GPIO18
    hsync_pin: GPIO16
    vsync_pin: GPIO17
    pclk_pin: GPIO21
    pclk_frequency: 12MHz
    pclk_inverted: false
    hsync_pulse_width: 8
    hsync_front_porch: 10
    hsync_back_porch: 20
    vsync_pulse_width: 8
    vsync_front_porch: 10
    vsync_back_porch: 10
    update_interval: never
    auto_clear_enabled: false
    init_sequence:
      - 1
      - [0xFF, 0x77, 0x01, 0x00, 0x00, 0x10]
      - [0xCD, 0x00]
    data_pins:
      red: [11, 12, 13, 14, 0]
      green: [8, 20, 3, 46, 9, 10]
      blue: [4, 5, 6, 7, 15]

# =============================================================================
# Touchscreen - GT911 (Polling Mode)
# =============================================================================
touchscreen:
  - platform: gt911
    id: my_touchscreen
    display: my_display
    on_touch:
      - lambda: id(last_touch) = millis();
      - light.turn_on:
          id: backlight
          brightness: 1.0
          transition_length: 300ms

# =============================================================================
# Home Assistant Entities
# =============================================================================
text_sensor:
  - platform: homeassistant
    id: alarm_state
    entity_id: ${alarm_entity}
    on_value:
      - script.execute: update_status

  - platform: wifi_info
    ip_address:
      name: "${friendly_name} IP Address"
      id: wifi_ip
    ssid:
      name: "${friendly_name} Connected SSID"
      id: wifi_ssid_info

# =============================================================================
# LVGL UI - Scaled for 480x480 (1.5x width, 2x height from 320x240)
# =============================================================================
lvgl:
  displays:
    - my_display
  touchscreens:
    - my_touchscreen
  buffer_size: 25%

  pages:
    # =========================================================================
    # WiFi Setup Page
    # =========================================================================
    - id: wifi_setup_page
      bg_color: 0x0D1117
      widgets:
        # Header bar (480x80)
        - obj:
            align: TOP_MID
            width: 480
            height: 80
            bg_color: 0x161B22
            radius: 0
            border_width: 0

        - label:
            align: TOP_MID
            y: 25
            text: "WiFi Setup Required"
            text_color: 0xFF6600
            text_font: montserrat_36

        # Instructions card (450x300)
        - obj:
            align: CENTER
            y: 20
            width: 450
            height: 300
            bg_color: 0x161B22
            radius: 18
            border_width: 3
            border_color: 0xFF6600

        - label:
            align: CENTER
            y: -60
            text: "1. Connect to WiFi network:"
            text_color: 0x8B949E
            text_font: montserrat_22

        - label:
            id: ap_ssid_label
            align: CENTER
            y: -16
            text: "${friendly_name} Setup"
            text_color: 0x71CC2E
            text_font: montserrat_28

        - label:
            align: CENTER
            y: 36
            text: "2. Password: configme123"
            text_color: 0x8B949E
            text_font: montserrat_22

        - label:
            align: CENTER
            y: 90
            text: "3. Configure your WiFi"
            text_color: 0x8B949E
            text_font: montserrat_22

        - label:
            align: CENTER
            y: 136
            text: "in the portal that opens"
            text_color: 0x8B949E
            text_font: montserrat_22

        - label:
            align: BOTTOM_MID
            y: -30
            text: "Waiting for connection..."
            text_color: 0x3C3C3C
            text_font: montserrat_22

    # =========================================================================
    # Main Page
    # =========================================================================
    - id: main_page
      bg_color: 0x0D1117
      widgets:
        # Top bar (480x64)
        - obj:
            align: TOP_MID
            width: 480
            height: 64
            bg_color: 0x161B22
            radius: 0
            border_width: 0

        # Time
        - label:
            id: time_label
            text: "00:00"
            align: TOP_LEFT
            x: 18
            y: 20
            text_color: 0x8B949E
            text_font: montserrat_28

        # WiFi signal bars
        - obj:
            id: wifi_bar1
            align: TOP_RIGHT
            x: -68
            y: 40
            width: 9
            height: 9
            radius: 2
            bg_color: 0x3C3C3C
            border_width: 0

        - obj:
            id: wifi_bar2
            align: TOP_RIGHT
            x: -54
            y: 34
            width: 9
            height: 15
            radius: 2
            bg_color: 0x3C3C3C
            border_width: 0

        - obj:
            id: wifi_bar3
            align: TOP_RIGHT
            x: -40
            y: 28
            width: 9
            height: 21
            radius: 2
            bg_color: 0x3C3C3C
            border_width: 0

        - obj:
            id: wifi_bar4
            align: TOP_RIGHT
            x: -26
            y: 22
            width: 9
            height: 27
            radius: 2
            bg_color: 0x3C3C3C
            border_width: 0

        # Status card (420x180)
        - obj:
            id: status_card
            align: CENTER
            y: -30
            width: 420
            height: 180
            bg_color: 0x161B22
            radius: 24
            border_width: 3
            border_color: 0x30363D

        # Main status
        - label:
            id: status_label
            text: "Loading..."
            align: CENTER
            y: -30
            text_color: 0xFFFFFF
            text_font: montserrat_48

        # STAY button (195x110)
        - button:
            id: stay_btn
            align: BOTTOM_LEFT
            x: 30
            y: -30
            width: 195
            height: 110
            radius: 18
            bg_color: 0xFF6600
            on_press:
              - logger.log: "STAY button pressed!"
              - lambda: id(arming_started) = millis();
              - homeassistant.action:
                  action: alarm_control_panel.alarm_arm_home
                  data:
                    entity_id: ${alarm_entity}

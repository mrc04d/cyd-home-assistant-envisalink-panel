        # Restart button
        - btn:
            width: 200
            height: 50
            x: 140
            y: 400
            bg_color: 0xc0392b
            widgets:
              - label:
                  align: CENTER
                  text: "Restart Device"
            on_click:
              then:
                - button.press: restart_button


            y: 40
            width: 9
            height: 9
            radius: 2
            bg_color: 0x3C3C3C
            border_width: 0

        - obj:
            id: wifi_bar2
            align: TOP_RIGHT
            x: -54
            y: 34
            width: 9
            height: 15
            radius: 2
            bg_color: 0x3C3C3C
            border_width: 0

        - obj:

                  text_color: 0x94a3b8
              - label:
                  id: settings_wifi_info
                  y: 35
                  text_font: roboto_14
                  text: "WiFi: Connected"
              - label:
                  id: settings_ip_info
                  y: 60
                  text_font: roboto_14
                  text: "IP: 0.0.0.0"
              - label:
                  id: settings_uptime
                  y: 85
                  text_font: roboto_14
                  text: "Uptime: 0:00:00"
              - label:
                  id: settings_memory
                  y: 110
                  text_font: roboto_14
                  text: "Free Memory: -- KB"
              - label:
                  y: 145
                  text_font: roboto_14
                  text_color: 0x94a3b8

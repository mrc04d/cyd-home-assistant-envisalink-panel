              - label:
                  align: CENTER
                  text: "STAY"
                  text_color: 0xFFFFFF
                  text_font: montserrat_36

        # AWAY button (195x110)
        - button:
            id: away_btn
            align: BOTTOM_RIGHT
            x: -30
            y: -30
            width: 195
            height: 110
            radius: 18
            bg_color: 0xFF6600
            on_press:

# =============================================================================
# Guition ESP32-4848S040C_I - Alarm Panel for Envisalink
# =============================================================================

substitutions:
  device_name: guition-alarm-panel
  friendly_name: "Guition Alarm Panel"
  alarm_entity: "alarm_control_panel.home_alarm_partition_1"
  timezone: "Australia/Sydney"

  # UI colours
  button_blue: "0x227EE6"
  button_blue_pressed: "0x185DB0"
  button_grey: "0x3C3C3C"
  button_grey_pressed: "0x555555"
  button_green: "0x71CC2E"
  button_green_pressed: "0x5AAA24"
  button_red: "0xD94A4A"

  # PIN rules
  min_pin_length: "4"
  max_pin_length: "8"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  platformio_options:
    board_build.flash_mode: dio
    board_build.f_flash: 80000000L
    build_flags:
      - "-DARDUINO_USB_CDC_ON_BOOT=0"
  on_boot:
    priority: 600
    then:
      - light.turn_on:
          id: backlight
          brightness: 0.85
          transition_length: 800ms
      - delay: 500ms
      - script.execute: check_wifi_and_show_page
      - delay: 100ms
      - script.execute: update_status
      - script.execute: update_wifi_bars
      - script.execute: refresh_pin_display

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
      CONFIG_SPIRAM_RODATA: "y"

psram:
  mode: octal
  speed: 80MHz

logger:

api:
  reboot_timeout: 0s

ota:
  - platform: esphome

wifi:
  # ssid: !secret wifi_ssid
  # password: !secret wifi_password

  ap:
    ssid: "${friendly_name} Setup"
    password: "configme123"

  reboot_timeout: 0s

captive_portal:

time:
  - platform: sntp
    id: sntp_time
    timezone: ${timezone}
    servers:
      - 0.pool.ntp.org
      - 1.pool.ntp.org
      - 2.pool.ntp.org

globals:
  - id: last_touch
    type: uint32_t
    restore_value: no
    initial_value: '0'

  - id: pin_code
    type: std::string
    restore_value: no
    initial_value: '""'

  - id: disarm_pending
    type: bool
    restore_value: no
    initial_value: 'false'

spi:
  - id: lcd_spi
    clk_pin: GPIO48
    mosi_pin: GPIO47

i2c:
  id: touchscreen_bus
  sda: GPIO19
  scl:
    number: GPIO45
    ignore_strapping_warning: true
  frequency: 400kHz

output:
  - platform: ledc
    id: backlight_pwm
    pin: GPIO38
    frequency: 150Hz
    min_power: 0.01
    zero_means_zero: true

light:
  - platform: monochromatic
    output: backlight_pwm
    name: "${friendly_name} Backlight"
    id: backlight
    restore_mode: ALWAYS_ON
    default_transition_length: 0s

sensor:
  - platform: wifi_signal
    name: "${friendly_name} WiFi Signal"
    id: wifi_signal_db
    update_interval: 10s

display:
  - platform: st7701s
    id: my_display
    dimensions:
      width: 480
      height: 480
    spi_mode: MODE3
    data_rate: 2MHz
    color_order: RGB
    invert_colors: false
    cs_pin: GPIO39
    de_pin: GPIO18
    hsync_pin: GPIO16
    vsync_pin: GPIO17
    pclk_pin: GPIO21
    pclk_frequency: 12MHz
    pclk_inverted: false
    hsync_pulse_width: 8
    hsync_front_porch: 10
    hsync_back_porch: 20
    vsync_pulse_width: 8
    vsync_front_porch: 10
    vsync_back_porch: 10
    update_interval: never
    auto_clear_enabled: false
    init_sequence:
      - 1
      - [0xFF, 0x77, 0x01, 0x00, 0x00, 0x10]
      - [0xCD, 0x00]
    data_pins:
      red: [11, 12, 13, 14, 0]
      green: [8, 20, 3, 46, 9, 10]
      blue: [4, 5, 6, 7, 15]

touchscreen:
  - platform: gt911
    id: my_touchscreen
    display: my_display
    on_touch:
      - lambda: id(last_touch) = millis();
      - light.turn_on:
          id: backlight
          brightness: 1.0
          transition_length: 300ms

text_sensor:
  - platform: homeassistant
    id: alarm_state
    entity_id: ${alarm_entity}
    on_value:
      - script.execute: update_status

  - platform: wifi_info
    ip_address:
      name: "${friendly_name} IP Address"
      id: wifi_ip
    ssid:
      name: "${friendly_name} Connected SSID"
      id: wifi_ssid_info

lvgl:
  displays:
    - my_display
  touchscreens:
    - my_touchscreen
  buffer_size: 25%

  pages:
    - id: wifi_setup_page
      bg_color: 0x0D1117
      widgets:
        - obj:
            align: TOP_MID
            width: 480
            height: 80
            bg_color: 0x161B22
            radius: 0
            border_width: 0

        - label:
            align: TOP_MID
            y: 25
            text: "WiFi Setup Required"
            text_color: 0xFF6600
            text_font: montserrat_36

        - obj:
            align: CENTER
            y: 20
            width: 450
            height: 300
            bg_color: 0x161B22
            radius: 18
            border_width: 3
            border_color: 0xFF6600

        - label:
            align: CENTER
            y: -60
            text: "1. Connect to WiFi network:"
            text_color: 0x8B949E
            text_font: montserrat_22

        - label:
            id: ap_ssid_label
            align: CENTER
            y: -16
            text: "${friendly_name} Setup"
            text_color: 0x71CC2E
            text_font: montserrat_28

        - label:
            align: CENTER
            y: 36
            text: "2. Password: configme123"
            text_color: 0x8B949E
            text_font: montserrat_22

        - label:
            align: CENTER
            y: 90
            text: "3. Configure your WiFi"
            text_color: 0x8B949E
            text_font: montserrat_22

        - label:
            align: CENTER
            y: 136
            text: "in the portal that opens"
            text_color: 0x8B949E
            text_font: montserrat_22

        - label:
            align: BOTTOM_MID
            y: -30
            text: "Waiting for connection..."
            text_color: 0x3C3C3C
            text_font: montserrat_22

    - id: main_page
      bg_color: 0x0D1117
      widgets:
        - obj:
            align: TOP_MID
            width: 480
            height: 64
            bg_color: 0x161B22
            radius: 0
            border_width: 0

        - label:
            id: time_label
            text: "00:00"
            align: TOP_LEFT
            x: 18
            y: 20
            text_color: 0x8B949E
            text_font: montserrat_28

        - obj:
            id: wifi_bar1

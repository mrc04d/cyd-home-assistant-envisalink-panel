                  text_color: 0xFFFFFF
                  text_font: montserrat_36

        # DISARM button (300x110)
        - button:
            id: disarm_btn
            align: BOTTOM_MID
            y: -30
            width: 300
            height: 110
            radius: 18
            bg_color: 0xFF6600
            on_press:
              - logger.log: "DISARM button pressed"
              - lambda: id(pin_code) = "";
              - lvgl.label.update:
                  id: pin_display
                  text: "Enter PIN"
              - lvgl.widget.update:

  #             snprintf(buf, sizeof(buf), "%.0f%%", x);
  #             return std::string(buf);

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "${friendly_name} IP Address"
      id: wifi_ip
      on_value:
        then:
          - lvgl.label.update:
              id: footer_ip
              text: !lambda return x;
          - lvgl.label.update:
              id: settings_ip_info
              text: !lambda return "IP: " + x;
    ssid:
      name: "${friendly_name} Connected SSID"
      on_value:
        then:
          - lvgl.label.update:
              id: settings_wifi_info
              text: !lambda return "WiFi: " + x;

binary_sensor:
  - platform: status
    name: "${friendly_name} Status"

button:
  - platform: restart
    name: "${friendly_name} Restart"
    id: restart_button

# Diagnostic switch
switch:
  - platform: template
    name: "${friendly_name} Antiburn"
    id: antiburn_switch
    optimistic: true
    on_turn_on:
      then:
        - lvgl.pause:
            show_snow: true
    on_turn_off:
      then:
        - lvgl.resume:
              grid_rows: [FR(1), FR(1), FR(1), FR(1)]
            widgets:
              - btn:
                  grid_cell_column_pos: 0
                  grid_cell_row_pos: 0
                  width: 75
                  height: 55
                  widgets:
                    - label:
                        align: CENTER
                        text_font: roboto_24
                        text: "1"
                  on_click:
                    - logger.log: "Key 1"
              - btn:
                  grid_cell_column_pos: 1
                  grid_cell_row_pos: 0
                  width: 75
                  height: 55
                  widgets:
                    - label:
                        align: CENTER
                        text_font: roboto_24
                        text: "2"
                  on_click:
                    - logger.log: "Key 2"
              - btn:
                  grid_cell_column_pos: 2
                  grid_cell_row_pos: 0
                  width: 75
                  height: 55
                  widgets:
                    - label:
                        align: CENTER
                        text_font: roboto_24
                        text: "3"
                  on_click:
                    - logger.log: "Key 3"
              - btn:
                  grid_cell_column_pos: 0
                  grid_cell_row_pos: 1
                  width: 75
                  height: 55
                  widgets:
                    - label:
                        align: CENTER
                        text_font: roboto_24
                        text: "4"
                  on_click:
                    - logger.log: "Key 4"
              - btn:
                  grid_cell_column_pos: 1
                  grid_cell_row_pos: 1
                  width: 75
                  height: 55
                  widgets:
                    - label:
                        align: CENTER
                        text_font: roboto_24
                        text: "5"
                  on_click:
                    - logger.log: "Key 5"
              - btn:
                  grid_cell_column_pos: 2
                  grid_cell_row_pos: 1
                  width: 75
                  height: 55
                  widgets:
                    - label:
                        align: CENTER
                        text_font: roboto_24
                        text: "6"
                  on_click:
                    - logger.log: "Key 6"
              - btn:
                  grid_cell_column_pos: 0
                  grid_cell_row_pos: 2
                  width: 75
                  height: 55
                  widgets:
                    - label:
                        align: CENTER
                        text_font: roboto_24
                        text: "7"
                  on_click:
                    - logger.log: "Key 7"
              - btn:
                  grid_cell_column_pos: 1
                  grid_cell_row_pos: 2
                  width: 75
                  height: 55
                  widgets:
                    - label:
                        align: CENTER
                        text_font: roboto_24
                        text: "8"
                  on_click:
                    - logger.log: "Key 8"
              - btn:
                  grid_cell_column_pos: 2
                  grid_cell_row_pos: 2
                  width: 75
                  height: 55
                  widgets:
                    - label:
                        align: CENTER
                        text_font: roboto_24
                        text: "9"
                  on_click:
                    - logger.log: "Key 9"
              - btn:
                  grid_cell_column_pos: 0
                  grid_cell_row_pos: 3
                  width: 75
                  height: 55
                  bg_color: 0xc0392b
                  widgets:
                    - label:
                        align: CENTER
                        text_font: material_24
                        text: "\U000F0156"
                  on_click:
                    - logger.log: "Clear"
              - btn:
                  grid_cell_column_pos: 1
                  grid_cell_row_pos: 3
                  width: 75
                  height: 55
                  widgets:
                    - label:
                        align: CENTER
                        text_font: roboto_24
                        text: "0"
                  on_click:
                    - logger.log: "Key 0"
              - btn:
                  grid_cell_column_pos: 2
                  grid_cell_row_pos: 3
                  width: 75
                  height: 55
                  bg_color: 0x27ae60
                  widgets:
                    - label:
                        align: CENTER
                        text_font: material_24
                        text: "\U000F012C"
                  on_click:
                    - logger.log: "Enter"

    # ===== SETTINGS PAGE =====
    - id: settings_page
      widgets:
        - obj:
            width: 480
            height: 50
            bg_color: 0x16213e
            radius: 0
            widgets:
              - btn:
                  width: 50
                  height: 40
                  x: 5
                  y: 5
                  widgets:
                    - label:
                        align: CENTER
                        text_font: material_24
                        text: "\U000F004D"
                  on_click:
                    then:
                      - lvgl.page.show: main_page
              - label:

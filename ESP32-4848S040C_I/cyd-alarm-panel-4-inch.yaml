# Time
time:
  - platform: homeassistant
    id: ha_time
    on_time_sync:
      then:
        - lvgl.label.update:
            id: header_time
            text: !lambda |-
              char buf[10];
              auto time = id(ha_time).now();
              snprintf(buf, sizeof(buf), "%02d:%02d", time.hour, time.minute);
              return std::string(buf);
    on_time:
      - seconds: 0
        then:
          - lvgl.label.update:
              id: header_time
              text: !lambda |-
                char buf[10];
                auto time = id(ha_time).now();
                snprintf(buf, sizeof(buf), "%02d:%02d", time.hour, time.minute);
                return std::string(buf);
          - lvgl.label.update:
              id: header_date
              text: !lambda |-
                char buf[20];
                auto time = id(ha_time).now();
                strftime(buf, sizeof(buf), "%a, %b %d", &time);
                return std::string(buf);

# Sensors
sensor:
  - platform: uptime
    id: uptime_sensor
    update_interval: 60s
    on_value:
      then:
        - lvgl.label.update:
            id: settings_uptime
            text: !lambda |-
              int seconds = (int)x;
              int hours = seconds / 3600;
              int minutes = (seconds % 3600) / 60;
              char buf[32];
              snprintf(buf, sizeof(buf), "Uptime: %d:%02d:%02d", hours, minutes, seconds % 60);
              return std::string(buf);

  - platform: wifi_signal
    name: "${friendly_name} WiFi Signal"
    id: wifi_signal_db
    update_interval: 60s

  - platform: internal_temperature
    name: "${friendly_name} CPU Temperature"
    update_interval: 60s

  # Home Assistant sensors - uncomment and modify as needed

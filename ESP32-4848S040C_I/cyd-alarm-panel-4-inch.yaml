                  digit: "3"
            widgets:
              - label:
                  align: CENTER
                  text: "3"
                  text_color: 0xFFFFFF
                  text_font: montserrat_40

        - button:
            x: 36
            y: 223
            width: 110
            height: 78
            radius: 14
            bg_color: ${button_blue}
            border_width: 0
            pressed:
              bg_color: ${button_blue_pressed}
            on_press:
              - script.execute:
                  id: add_pin_digit
                  digit: "4"
            widgets:
              - label:
                  align: CENTER
                  text: "4"
                  text_color: 0xFFFFFF
                  text_font: montserrat_40

        - button:
            x: 185
            y: 223
            width: 110
            height: 78
            radius: 14
            bg_color: ${button_blue}
            border_width: 0
            pressed:
              bg_color: ${button_blue_pressed}
            on_press:
              - script.execute:
                  id: add_pin_digit
                  digit: "5"
            widgets:
              - label:
                  align: CENTER
                  text: "5"
                  text_color: 0xFFFFFF
                  text_font: montserrat_40

        - button:
            x: 334
            y: 223
            width: 110
            height: 78
            radius: 14
            bg_color: ${button_blue}
            border_width: 0
            pressed:
              bg_color: ${button_blue_pressed}
            on_press:
              - script.execute:
                  id: add_pin_digit
                  digit: "6"
            widgets:
              - label:
                  align: CENTER
                  text: "6"
                  text_color: 0xFFFFFF
                  text_font: montserrat_40

        - button:
            x: 36
            y: 314
            width: 110
            height: 78
            radius: 14
            bg_color: ${button_blue}
            border_width: 0
            pressed:
              bg_color: ${button_blue_pressed}
            on_press:
              - script.execute:
                  id: add_pin_digit
                  digit: "7"
            widgets:
              - label:
                  align: CENTER
                  text: "7"
                  text_color: 0xFFFFFF
                  text_font: montserrat_40

        - button:
            x: 185
            y: 314
            width: 110
            height: 78
            radius: 14
            bg_color: ${button_blue}

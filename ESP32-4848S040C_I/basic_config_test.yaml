substitutions:
  device_name: esp32-4848s040-display-test
  friendly_name: "4inch Display Test"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  platformio_options:
    board_build.flash_mode: dio
    board_build.f_flash: 80000000L

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
      CONFIG_SPIRAM_RODATA: "y"

psram:
  mode: octal
  speed: 80MHz

logger:
  level: DEBUG

api:
  encryption:
    key: "YOUR_API_KEY_HERE"

ota:
  - platform: esphome
    password: "YOUR_OTA_PASSWORD_HERE"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${device_name} Fallback"
    password: "fallback123"

captive_portal:

# I2C bus for touch controller
i2c:
  - id: bus_a
    sda: GPIO19
    scl: GPIO45
    scan: true
    frequency: 400kHz

# Backlight control
output:
  - platform: ledc
    pin: GPIO38
    id: backlight_pwm
    frequency: 1220Hz

light:
  - platform: monochromatic
    output: backlight_pwm
    name: "${friendly_name} Backlight"
    id: display_backlight
    restore_mode: ALWAYS_ON
    default_transition_length: 250ms
    gamma_correct: 2.8

# Display configuration for ST7701S
display:
  - platform: qspi_amoled
    model: T4-S3
    id: main_display
    dimensions:
      width: 480
      height: 480
    color_order: rgb
    brightness: 255
    cs_pin: GPIO6
    reset_pin: GPIO5
    enable_pin: GPIO7
    update_interval: never
    auto_clear_enabled: false
    lambda: |-
      // Fill background with dark blue
      it.fill(Color(0, 0, 40));
      
      // Draw title
      it.printf(240, 40, id(roboto_24), Color(255, 255, 255), TextAlign::CENTER, "ESP32-4848S040C_I");
      it.printf(240, 70, id(roboto_16), Color(200, 200, 200), TextAlign::CENTER, "Display Test");
      
      // Draw test rectangles
      it.filled_rectangle(40, 120, 100, 100, Color(255, 0, 0));    // Red
      it.filled_rectangle(190, 120, 100, 100, Color(0, 255, 0));   // Green
      it.filled_rectangle(340, 120, 100, 100, Color(0, 0, 255));   // Blue
      
      // Draw labels
      it.printf(90, 235, id(roboto_16), Color(255, 255, 255), TextAlign::CENTER, "RED");
      it.printf(240, 235, id(roboto_16), Color(255, 255, 255), TextAlign::CENTER, "GREEN");
      it.printf(390, 235, id(roboto_16), Color(255, 255, 255), TextAlign::CENTER, "BLUE");
      
      // Draw more test shapes
      it.filled_rectangle(40, 280, 400, 60, Color(255, 255, 0));   // Yellow bar
      it.printf(240, 310, id(roboto_16), Color(0, 0, 0), TextAlign::CENTER, "YELLOW");
      
      it.filled_rectangle(40, 360, 400, 60, Color(255, 0, 255));   // Magenta bar
      it.printf(240, 390, id(roboto_16), Color(255, 255, 255), TextAlign::CENTER, "MAGENTA");
      
      // Draw border around entire screen
      it.rectangle(0, 0, 480, 480, Color(255, 255, 255));
      it.rectangle(1, 1, 478, 478, Color(255, 255, 255));
      
      // Show uptime
      int seconds = (int)(id(uptime_sensor).state);
      int minutes = seconds / 60;
      int hours = minutes / 60;
      it.printf(240, 455, id(roboto_16), Color(150, 150, 150), TextAlign::CENTER, 
                "Uptime: %02d:%02d:%02d", hours, minutes % 60, seconds % 60);

# Fonts
font:
  - file: "gfonts://Roboto"
    id: roboto_24
    size: 24
  - file: "gfonts://Roboto"
    id: roboto_16
    size: 16

# Sensors
sensor:
  - platform: uptime
    name: "${friendly_name} Uptime"
    id: uptime_sensor
    update_interval: 1s
    on_value:
      then:
        - component.update: main_display

  - platform: wifi_signal
    name: "${friendly_name} WiFi Signal"
    update_interval: 60s

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "${friendly_name} IP Address"

# Restart button
button:
  - platform: restart
    name: "${friendly_name} Restart"
substitutions:
  device_name: cyd-alarm
  friendly_name: "CYD Alarm Panel"
  # Change this to your alarm entity ID
  alarm_entity: "alarm_control_panel.home_alarm_partition_1"
  # Grace period in milliseconds (10 seconds = 10000)
  grace_period_ms: "10000"
  # Change this to your timezone - examples:
  # Australia/Sydney, America/New_York, Europe/London, Asia/Tokyo
  # Full list: https://en.wikipedia.org/wiki/List_of_tz_database_time_zones
  timezone: "Australia/Sydney"

esphome:
  name: ${device_name}
  on_boot:
    priority: 600
    then:
      - light.turn_on:
          id: backlight
          brightness: 0.85
          transition_length: 800ms
      - delay: 500ms
      - script.execute: check_wifi_and_show_page
      - delay: 100ms
      - script.execute: update_status
      - script.execute: update_wifi_bars
      - script.execute: refresh_pin_display

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:

api:
  reboot_timeout: 0s

ota:
  - platform: esphome

# =============================================================================
# WiFi Configuration
# =============================================================================
wifi:
  # Uncomment below to hardcode WiFi credentials
  # ssid: !secret wifi_ssid
  # password: !secret wifi_password

  # Optional: Uncomment below for static IP
  # manual_ip:
  #   static_ip: 192.168.1.70
  #   gateway: 192.168.1.1
  #   subnet: 255.255.255.0
  #   dns1: 192.168.1.1

  # Fallback/Setup AP - connects to this if no WiFi configured or connection fails
  ap:
    ssid: "${friendly_name} Setup"
    password: "configme123"

  reboot_timeout: 0s

captive_portal:

time:
  - platform: sntp
    id: sntp_time
    timezone: ${timezone}
    servers:
      - 0.pool.ntp.org
      - 1.pool.ntp.org
      - 2.pool.ntp.org

# =========================
# GLOBALS
# =========================
globals:
  - id: last_touch
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: pin_code
    type: std::string
    restore_value: no
    initial_value: '""'
  - id: arming_started
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: disarm_pending
    type: bool
    restore_value: no
    initial_value: 'false'

# =========================
# HARDWARE
# =========================
output:
  - platform: ledc
    pin: GPIO21
    id: backlight_pwm
    frequency: 1000

  - platform: ledc
    pin: GPIO26
    id: buzzer_pwm
    frequency: 2700

light:
  - platform: monochromatic
    output: backlight_pwm
    name: Display Backlight
    id: backlight
    restore_mode: ALWAYS_ON
    default_transition_length: 0s

switch:
  - platform: output
    id: buzzer
    output: buzzer_pwm

# =========================
# SENSORS
# =========================
sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    id: wifi_signal_db
    update_interval: 10s

# =========================
# SPI + Display + Touch
# =========================
spi:
  - id: tft
    clk_pin: GPIO14
    mosi_pin: GPIO13
    miso_pin: GPIO12

  - id: touch
    clk_pin: GPIO25
    mosi_pin: GPIO32
    miso_pin: GPIO39

display:
  - platform: ili9xxx
    model: ILI9341
    id: my_display
    spi_id: tft
    cs_pin: GPIO15
    dc_pin: GPIO2
    auto_clear_enabled: false
    invert_colors: false
    color_order: bgr
    rotation: 0
    dimensions:
      width: 320
      height: 240

touchscreen:
  - platform: xpt2046
    id: my_touchscreen
    spi_id: touch
    cs_pin: GPIO33
    interrupt_pin: GPIO36
    calibration:
      x_min: 435
      x_max: 3835
      y_min: 225
      y_max: 3635
    transform:
      swap_xy: true
      mirror_x: true
      mirror_y: true
    on_touch:
      - lambda: id(last_touch) = millis();
      - light.turn_on:
          id: backlight
          brightness: 1.0
          transition_length: 300ms

# =========================
# HOME ASSISTANT ENTITIES
# =========================
text_sensor:
  - platform: homeassistant
    id: alarm_state
    entity_id: ${alarm_entity}
    on_value:
      - script.execute: update_status

  - platform: wifi_info
    ip_address:
      name: "IP Address"
      id: wifi_ip
    ssid:
      name: "Connected SSID"
      id: wifi_ssid_info

# =========================
# LVGL UI
# =========================
lvgl:
  displays:
    - my_display
  touchscreens:
    - my_touchscreen
  buffer_size: 25%

  pages:
    # ---- WIFI SETUP PAGE ----
    - id: wifi_setup_page
      bg_color: 0x0D1117
      widgets:
        - obj:
            align: TOP_MID
            width: 320
            height: 40
            bg_color: 0x161B22
            radius: 0
            border_width: 0

        - label:
            align: TOP_MID
            y: 10
            text: "WiFi Setup Required"
            text_color: 0xFF6600
            text_font: montserrat_22

        - obj:
            align: CENTER
            y: 10
            width: 300
            height: 150
            bg_color: 0x161B22
            radius: 12
            border_width: 2
            border_color: 0xFF6600

        - label:
            align: CENTER
            y: -30
            text: "1. Connect to WiFi network:"
            text_color: 0x8B949E

        - label:
            id: ap_ssid_label
            align: CENTER
            y: -8
            text: "${friendly_name} Setup"
            text_color: 0x71CC2E
            text_font: montserrat_18

        - label:
            align: CENTER
            y: 18
            text: "2. Password: configme123"
            text_color: 0x8B949E

        - label:
            align: CENTER
            y: 45
            text: "3. Configure your WiFi"
            text_color: 0x8B949E

        - label:
            align: CENTER
            y: 68
            text: "in the portal that opens"
            text_color: 0x8B949E

        - label:
            align: BOTTOM_MID
            y: -15
            text: "Waiting for connection..."
            text_color: 0x3C3C3C

    # ---- MAIN PAGE ----
    - id: main_page
      bg_color: 0x0D1117
      widgets:
        - obj:
            align: TOP_MID
            width: 320
            height: 32
            bg_color: 0x161B22
            radius: 0
            border_width: 0

        - label:
            id: time_label
            text: "00:00"
            align: TOP_LEFT
            x: 12
            y: 7
            text_color: 0x8B949E

        - obj:
            id: wifi_bar1
            align: TOP_RIGHT
            x: -45
            y: 18
            width: 6
            height: 6
            radius: 1
            bg_color: 0x3C3C3C
            border_width: 0

        - obj:
            id: wifi_bar2
            align: TOP_RIGHT
            x: -36
            y: 15
            width: 6
            height: 9
            radius: 1
            bg_color: 0x3C3C3C
            border_width: 0

        - obj:
            id: wifi_bar3
            align: TOP_RIGHT
            x: -27
            y: 12
            width: 6
            height: 12
            radius: 1
            bg_color: 0x3C3C3C
            border_width: 0

        - obj:
            id: wifi_bar4
            align: TOP_RIGHT
            x: -18
            y: 9
            width: 6
            height: 15
            radius: 1
            bg_color: 0x3C3C3C
            border_width: 0

        - obj:
            id: status_card
            align: CENTER
            y: -15
            width: 280
            height: 90
            bg_color: 0x161B22
            radius: 16
            border_width: 2
            border_color: 0x30363D

        - label:
            id: status_label
            text: "Loading..."
            align: CENTER
            y: -15
            text_color: 0xFFFFFF
            text_font: montserrat_28

        - button:
            id: stay_btn
            align: BOTTOM_LEFT
            x: 20
            y: -15
            width: 130
            height: 55
            radius: 12
            bg_color: 0xFF6600
            on_press:
              - logger.log: "STAY button pressed!"
              - lambda: id(arming_started) = millis();
              - homeassistant.action:
                  action: alarm_control_panel.alarm_arm_home
                  data:
                    entity_id: ${alarm_entity}
            widgets:
              - label:
                  align: CENTER
                  text: "STAY"
                  text_color: 0xFFFFFF
                  text_font: montserrat_18

        - button:
            id: away_btn
            align: BOTTOM_RIGHT
            x: -20
            y: -15
            width: 130
            height: 55
            radius: 12
            bg_color: 0xFF6600
            on_press:
              - logger.log: "AWAY button pressed!"
              - lambda: id(arming_started) = millis();
              - homeassistant.action:
                  action: alarm_control_panel.alarm_arm_away
                  data:
                    entity_id: ${alarm_entity}
            widgets:
              - label:
                  align: CENTER
                  text: "AWAY"
                  text_color: 0xFFFFFF
                  text_font: montserrat_18

        - button:
            id: cancel_btn
            align: BOTTOM_MID
            y: -15
            width: 200
            height: 55
            radius: 12
            bg_color: 0xFF6600
            on_press:
              - logger.log: "Cancel button pressed - showing numpad"
              - script.execute: open_numpad
            widgets:
              - label:
                  align: CENTER
                  text: "CANCEL"
                  text_color: 0xFFFFFF
                  text_font: montserrat_18

        - button:
            id: disarm_btn
            align: BOTTOM_MID
            y: -15
            width: 200
            height: 55
            radius: 12
            bg_color: 0xFF6600
            on_press:
              - logger.log: "DISARM button pressed - showing numpad"
              - script.execute: open_numpad
            widgets:
              - label:
                  align: CENTER
                  text: "DISARM"
                  text_color: 0xFFFFFF
                  text_font: montserrat_18

    # ---- NUMPAD PAGE ----
    - id: numpad_page
      bg_color: 0x0D1117
      widgets:
        - obj:
            x: 8
            y: 8
            width: 304
            height: 40
            bg_color: 0x161B22
            radius: 8
            border_width: 2
            border_color: 0x30363D

        - label:
            id: pin_display
            align: TOP_MID
            y: 12
            text: "ENTER PIN"
            text_align: CENTER
            text_color: 0x8B949E
            text_font: montserrat_16

        - label:
            id: pin_mask
            align: TOP_MID
            y: 28
            text: ""
            text_align: CENTER
            text_color: 0xFFFFFF
            text_font: montserrat_16

        - button:
            x: 8
            y: 56
            width: 70
            height: 40
            radius: 8
            bg_color: 0xFF6600
            on_press:
              - script.execute:
                  id: add_pin_digit
                  digit: "1"
            widgets:
              - label:
                  align: CENTER
                  text: "1"
                  text_color: 0xFFFFFF
                  text_font: montserrat_24

        - button:
            x: 86
            y: 56
            width: 70
            height: 40
            radius: 8
            bg_color: 0xFF6600
            on_press:
              - script.execute:
                  id: add_pin_digit
                  digit: "2"
            widgets:
              - label:
                  align: CENTER
                  text: "2"
                  text_color: 0xFFFFFF
                  text_font: montserrat_24

        - button:
            x: 164
            y: 56
            width: 70
            height: 40
            radius: 8
            bg_color: 0xFF6600
            on_press:
              - script.execute:
                  id: add_pin_digit
                  digit: "3"
            widgets:
              - label:
                  align: CENTER
                  text: "3"
                  text_color: 0xFFFFFF
                  text_font: montserrat_24

        - button:
            x: 242
            y: 56
            width: 70
            height: 40
            radius: 8
            bg_color: 0x3C3C3C
            on_press:
              - script.execute: handle_clr_back
            widgets:
              - label:
                  id: clr_back_label
                  align: CENTER
                  text: "BACK"
                  text_color: 0xFFFFFF
                  text_font: montserrat_16

        - button:
            x: 8
            y: 104
            width: 70
            height: 40
            radius: 8
            bg_color: 0xFF6600
            on_press:
              - script.execute:
                  id: add_pin_digit
                  digit: "4"
            widgets:
              - label:
                  align: CENTER
                  text: "4"
                  text_color: 0xFFFFFF
                  text_font: montserrat_24

        - button:
            x: 86
            y: 104
            width: 70
            height: 40
            radius: 8
            bg_color: 0xFF6600
            on_press:
              - script.execute:
                  id: add_pin_digit
                  digit: "5"
            widgets:
              - label:
                  align: CENTER
                  text: "5"
                  text_color: 0xFFFFFF
                  text_font: montserrat_24

        - button:
            x: 164
            y: 104
            width: 70
            height: 40
            radius: 8
            bg_color: 0xFF6600
            on_press:
              - script.execute:
                  id: add_pin_digit
                  digit: "6"
            widgets:
              - label:
                  align: CENTER
                  text: "6"
                  text_color: 0xFFFFFF
                  text_font: montserrat_24

        - button:
            x: 242
            y: 104
            width: 70
            height: 40
            radius: 8
            bg_color: 0x71CC2E
            on_press:
              - logger.log: "OK pressed - sending disarm"
              - script.execute: send_disarm
            widgets:
              - label:
                  align: CENTER
                  text: "OK"
                  text_color: 0xFFFFFF
                  text_font: montserrat_18

        - button:
            x: 8
            y: 152
            width: 70
            height: 40
            radius: 8
            bg_color: 0xFF6600
            on_press:
              - script.execute:
                  id: add_pin_digit
                  digit: "7"
            widgets:
              - label:
                  align: CENTER
                  text: "7"
                  text_color: 0xFFFFFF
                  text_font: montserrat_24

        - button:
            x: 86
            y: 152
            width: 70
            height: 40
            radius: 8
            bg_color: 0xFF6600
            on_press:
              - script.execute:
                  id: add_pin_digit
                  digit: "8"
            widgets:
              - label:
                  align: CENTER
                  text: "8"

              - script.execute: send_disarm
            widgets:
              - label:
                  align: CENTER
                  text: "OK"
                  text_color: 0xFFFFFF
                  text_font: montserrat_22

        # BACK button
        - button:
            x: 218
            y: 182
            width: 94
            height: 52
            radius: 8
            bg_color: 0x3C3C3C
            on_press:
              - logger.log: "Back pressed"
              - lambda: id(pin_code) = "";
              - lvgl.page.show: main_page
            widgets:
              - label:
                  align: CENTER
                  text: "BACK"
                  text_color: 0xFFFFFF
                  text_font: montserrat_18

# =========================
# SCRIPTS & LOGIC
# =========================
script:
  - id: check_wifi_and_show_page
    then:
      - if:
          condition:
            wifi.connected:
          then:
            - lvgl.page.show: main_page
          else:
            - lvgl.page.show: wifi_setup_page

  - id: add_pin_digit
    parameters:
      digit: string
    then:
      - lambda: |-
          id(pin_code) += digit;
          std::string masked = "";
          for (int i = 0; i < id(pin_code).length(); i++) {
            masked += "*";
          }
          lv_label_set_text(id(pin_display), masked.c_str());
          lv_obj_set_style_text_color(id(pin_display), lv_color_hex(0xFFFFFF), 0);

  - id: handle_cancel
    then:
      - lambda: |-
          uint32_t elapsed = millis() - id(arming_started);
          ESP_LOGD("cancel", "Time since arming: %d ms", elapsed);
      - if:
          condition:
            lambda: 'return (millis() - id(arming_started)) < ${grace_period_ms};'
          then:
            - logger.log: "Within grace period - cancelling without code"
            - homeassistant.action:
                action: alarm_control_panel.alarm_disarm
                data:
                  entity_id: ${alarm_entity}
          else:
            - logger.log: "Grace period expired - showing numpad"
            - lambda: id(pin_code) = "";
            - lvgl.label.update:
                id: pin_display
                text: "Enter PIN"
            - lvgl.widget.update:
                id: pin_display
                text_color: 0xFFFFFF
            - lvgl.page.show: numpad_page

  - id: send_disarm
    then:
      - homeassistant.action:
          action: alarm_control_panel.alarm_disarm
          data:
            entity_id: ${alarm_entity}
          data_template:
            code: !lambda return id(pin_code);
      - delay: 1500ms
      - if:
          condition:
            lambda: 'return id(alarm_state).state != "disarmed";'
          then:
            - lambda: |-
                lv_label_set_text(id(pin_display), "WRONG PIN");
                lv_obj_set_style_text_color(id(pin_display), lv_color_hex(0x3C4CE7), 0);
                id(pin_code) = "";
          else:
            - lambda: id(pin_code) = "";

  - id: update_status
    then:
      - lambda: |-
          std::string state = id(alarm_state).state;
          const char* display_text = "UNKNOWN";
          uint32_t text_color = 0xFFFFFF;
          uint32_t card_border = 0x30363D;
          bool show_arm_buttons = false;
          bool show_disarm_button = false;
          bool show_cancel_button = false;

          if (state == "disarmed") {
            display_text = "READY";
            text_color = 0x71CC2E;
            card_border = 0x71CC2E;
            show_arm_buttons = true;
            show_disarm_button = false;
            show_cancel_button = false;
          }
          else if (state == "armed_home") {
            display_text = "STAY ARMED";
            text_color = 0x0FC4F1;
            card_border = 0x0FC4F1;
            show_arm_buttons = false;
            show_disarm_button = true;
            show_cancel_button = false;
          }
          else if (state == "armed_away") {
            display_text = "AWAY ARMED";
            text_color = 0x3C4CE7;
            card_border = 0x3C4CE7;
            show_arm_buttons = false;
            show_disarm_button = true;
            show_cancel_button = false;
          }
          else if (state == "arming") {
            display_text = "EXIT DELAY";
            text_color = 0x227EE6;
            card_border = 0x227EE6;
            show_arm_buttons = false;
            show_disarm_button = false;
            show_cancel_button = true;
          }
          else if (state == "pending") {
            display_text = "ENTRY DELAY";
            text_color = 0x227EE6;
            card_border = 0x227EE6;
            show_arm_buttons = false;
            show_disarm_button = true;
            show_cancel_button = false;
          }
          else if (state == "triggered") {
            display_text = "ALARM!";
            text_color = 0x3C4CE7;
            card_border = 0x3C4CE7;
            show_arm_buttons = false;
            show_disarm_button = true;
            show_cancel_button = false;
            id(buzzer).turn_on();
          }

          lv_label_set_text(id(status_label), display_text);
          lv_obj_set_style_text_color(id(status_label), lv_color_hex(text_color), 0);
          lv_obj_set_style_border_color(id(status_card), lv_color_hex(card_border), 0);

          if (show_arm_buttons) {
            lv_obj_clear_flag(id(stay_btn), LV_OBJ_FLAG_HIDDEN);
            lv_obj_clear_flag(id(away_btn), LV_OBJ_FLAG_HIDDEN);
          } else {
            lv_obj_add_flag(id(stay_btn), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(away_btn), LV_OBJ_FLAG_HIDDEN);
          }

          if (show_disarm_button) {
            lv_obj_clear_flag(id(disarm_btn), LV_OBJ_FLAG_HIDDEN);
          } else {
            lv_obj_add_flag(id(disarm_btn), LV_OBJ_FLAG_HIDDEN);
          }

          if (show_cancel_button) {
            lv_obj_clear_flag(id(cancel_btn), LV_OBJ_FLAG_HIDDEN);
          } else {
            lv_obj_add_flag(id(cancel_btn), LV_OBJ_FLAG_HIDDEN);
          }

          if (state != "triggered") {
            id(buzzer).turn_off();
          }
      - if:
          condition:
            lambda: 'return id(alarm_state).state == "disarmed";'
          then:
            - lvgl.page.show: main_page

  - id: update_wifi_bars
    then:
      - lambda: |-
          float signal = id(wifi_signal_db).state;
          
          uint32_t color_on = 0x71CC2E;
          uint32_t color_off = 0x3C3C3C;
          
          int bars = 0;
          if (!isnan(signal)) {
            if (signal > -50) bars = 4;
            else if (signal > -60) bars = 3;
            else if (signal > -70) bars = 2;
            else if (signal > -80) bars = 1;
            else bars = 0;
          }
          
          lv_obj_set_style_bg_color(id(wifi_bar1), lv_color_hex(bars >= 1 ? color_on : color_off), 0);
          lv_obj_set_style_bg_color(id(wifi_bar2), lv_color_hex(bars >= 2 ? color_on : color_off), 0);
          lv_obj_set_style_bg_color(id(wifi_bar3), lv_color_hex(bars >= 3 ? color_on : color_off), 0);
          lv_obj_set_style_bg_color(id(wifi_bar4), lv_color_hex(bars >= 4 ? color_on : color_off), 0);

# =============================================================================
# Intervals
# =============================================================================
interval:
  - interval: 1s
    then:
      - lambda: |-
          auto time = id(sntp_time).now();
          if (time.is_valid()) {
            char buf[16];
            snprintf(buf, sizeof(buf), "%02d:%02d", time.hour, time.minute);
            lv_label_set_text(id(time_label), buf);
          }

  - interval: 10s
    then:
      - script.execute: update_wifi_bars

  - interval: 5s
    then:
      - lambda: |-
          // Standard LVGL check using raw pointers
          lv_obj_t *active_screen = lv_scr_act();
          
          // Check if status_label is on the current screen
          bool on_main_page = (lv_obj_get_screen(id(status_label)) == active_screen);
          
          uint32_t idle_time = millis() - id(last_touch);
          
          if (!on_main_page) {
            // Stay on Numpad unless idle for 30s
            if (idle_time > 30000) {
              id(check_wifi_and_show_page).execute();
            }
          } else {
            id(check_wifi_and_show_page).execute();
          }

  - interval: 8s
    then:
      - lambda: |-
          if (millis() - id(last_touch) > 30000) {
            auto call = id(backlight).turn_on();
            call.set_brightness(0.15);
            call.set_transition_length(1500);
            call.perform();
            
            // Security: Reset to main status when dimming
            id(check_wifi_and_show_page).execute();
          }